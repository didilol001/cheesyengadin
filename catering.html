    <div class="cheese-drip" aria-hidden="true">

      </div>

  <!-- CATERING FORM -->
  <section class="catering-form-section">
    <div class="container">
      <h2>Want us at your event? Send your catering request here!</h2>

      <form class="catering-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Max Mustermann" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="max-mustermann@gmail.com" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="079 000 00 00" required>
        </div>

        <div class="form-group">
          <label for="location">Location</label>
          <input type="text" id="location" name="location" placeholder="La Punt" required>
        </div>

        <div class="form-group">
          <label for="event">Tell us about your event</label>
          <textarea id="event" name="event" rows="5" placeholder="Wedding, Birthday Party..."></textarea>
        </div>

        <button type="submit" class="btn btn-submit">Submit</button>
      </form>
    </div>
  </section>

  <div class="footer-wave" aria-hidden="true">
    <svg viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
