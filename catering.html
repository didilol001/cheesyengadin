  <div class="logo-area">
    <a href="index.html" aria-label="Cheesy">
      <img src="assets/schriftzug.svg" alt="Cheesy" class="logo-img" />
    </a>
  </div>

  <section class="hero">
    <div class="cheese-drip" aria-hidden="true">
      <svg viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path style="fill:#fbaf02" d="M0,58 C35,58 35,34 70,34 C130,34 130,98 190,98 C240,98 240,44 290,44 C345,44 345,72 400,72 C450,72 450,36 500,36 C570,36 570,108 640,108 C690,108 690,50 740,50 C805,50 805,80 870,80 C920,80 920,40 970,40 C1040,40 1040,92 1110,92 C1160,92 1160,38 1210,38 C1275,38 1275,70 1340,70 C1390,70 1390,55 1440,55 L1440,0 L0,0 Z"/></svg>

    <div class="hero-media">
      <img src="assets/cateringsection.jpg" alt="Catering" class="hero-img">

      <div class="hero-content">
        <h1 class="hero-title-text">Catering</h1>
      </div>
    </div>
  </section>

  <!-- CATERING FORM -->
  <section class="catering-form-section">
    <div class="container">
      <h2>Want us at your event? Send your catering request here!</h2>

      <form class="catering-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Max Mustermann" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="max-mustermann@gmail.com" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="079 000 00 00" required>
        </div>

        <div class="form-group">
          <label for="location">Location</label>
          <input type="text" id="location" name="location" placeholder="La Punt" required>
        </div>

        <div class="form-group">
          <label for="event">Tell us about your event</label>
          <textarea id="event" name="event" rows="5" placeholder="Wedding, Birthday Party..."></textarea>
        </div>

        <button type="submit" class="btn btn-submit">Submit</button>
      </form>
    </div>
  </section>

  <div class="footer-wave" aria-hidden="true">
    <svg viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path fill="#CFE9C9" d="M0,55 C80,55 180,15 260,55 C340,95 460,92 580,48 C700,5 840,8 960,52 C1080,96 1180,88 1300,55 C1360,35 1415,45 1440,52 L1440,120 L0,120 Z" />

    <p class="footer-contact">
      <span>076 741 19 95</span>
      <span class="dot">·</span>
      <a href="mailto:cheesyengadin@gmail.com">cheesyengadin@gmail.com</a>
    </p>
    <nav class="footer-nav">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>

  <script>
    (function(){
      var t=document.getElementById('navToggle');
      var l=document.getElementById('navLinks');
      if(t&&l){t.addEventListener('click',function(){var o=l.classList.toggle('open');t.classList.toggle('open',o);t.setAttribute('aria-expanded',o);});}
    })();
  </script>
